name: Testing Workflow

on: [push]

permissions:
  checks: write
  actions: read
  contents: read

jobs: 
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go environment
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest

  answers:
    name: Check Answers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: check exact answers
        run: sha256sum -c checksum
      - name: check loose answers
        run: test -s vm/release
        
  go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go environment
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: false
      - name: Run code
        run: go run ./cmd/greeting | grep "Здравейте"
