name: Testing Workflow

on: [push]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  test:
    name: test
    runs-on: ud-vdi-arc
    steps:
    - uses: actions/checkout@v3
    - name: Run all our tests
      timeout-minutes: 1
      run: |
        ./test.sh
    
  lint:
    name: lint
    runs-on: ud-vdi-arc
    steps:
    - uses: actions/checkout@v3
    - name: Add dependencies
      run: |
        sudo apt-get update
        sudo apt-get -y install curl tar xz-utils
    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@master
      with:
       scandir: './src'
