name: Testing Workflow

on: [push]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  lint:
    name: Lint
    # runs-on: ubuntu-latest
    # runs-on: self-hosted
    runs-on: ud-vdi-arc
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint-cli2.yaml
